name: UI Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t remotepass-ui-tests:latest .

      - name: Create report directories
        run: |
          mkdir -p playwright-report
          mkdir -p allure-results

      - name: Run tests in Docker
        run: |
          docker run --rm \
            -e BASE_URL=https://www.remotepass.com \
            -v "${{ github.workspace }}/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            remotepass-ui-tests:latest

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "No Allure results found"
          fi

      - name: Prepare GitHub Pages content
        if: always()
        run: |
          rm -rf public
          mkdir public

          echo "Copying Playwright report..."
          cp -r playwright-report/. public/ || true

          echo "Copying Allure report..."
          mkdir -p public/allure
          cp -r allure-report/. public/allure/ || true

          echo "Public folder structure:"
          ls -R public

      - name: Deploy reports to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Show report URLs
        if: always()
        run: |
          echo "## 📊 Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Playwright Report:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Allure Report:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure/" >> $GITHUB_STEP_SUMMARY